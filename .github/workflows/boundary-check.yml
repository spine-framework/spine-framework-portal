name: Core→Custom Boundary Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  boundary-check:
    name: Verify Architectural Boundaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run boundary check
        run: |
          echo "🔍 Checking Core→Custom boundary violations..."
          chmod +x scripts/boundary-check.sh
          ./scripts/boundary-check.sh

      - name: Check assembly works
        run: |
          echo "🔧 Testing assembly..."
          bash scripts/assemble.sh

      - name: Report success
        if: success()
        run: |
          echo "✅ All boundary checks passed!"
          echo ""
          echo "Summary:"
          echo "- No core→custom imports found"
          echo "- No static webhook handler imports"
          echo "- App-specific components removed from core"
          echo "- Assembly succeeds"
