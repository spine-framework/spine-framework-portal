name: Unit Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'v2-core/functions/**'
      - 'v2-core/tests/unit/**'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - 'v2-core/functions/**'
      - 'v2-core/tests/unit/**'
      - 'package.json'

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (functions)
        run: npx tsc --noEmit --project v2-core/tsconfig.json

      - name: Type check (CLI)
        run: npx tsc --noEmit --project v2-core/tsconfig.cli.json

      - name: Run unit tests
        run: npm run test:unit

  integration:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Runs only when enabled via repo variable.
    # Enable: GitHub → Settings → Variables → Actions → SPINE_RUN_INTEGRATION = true
    if: ${{ vars.SPINE_RUN_INTEGRATION == 'true' }}

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SPINE_TEST_ACCOUNT_ID: ${{ secrets.SPINE_TEST_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
